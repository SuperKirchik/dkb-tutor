services:
  postgres:
    image: postgres:16-alpine
    container_name: tutor-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tutor_platform
    ports:
      - "5432:5432"
    volumes:
      - tutor-platform-postgres:/var/lib/postgresql/data

volumes:
  tutor-platform-postgres:
